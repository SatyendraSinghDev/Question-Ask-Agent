services:
  # ───────────────────────────── MongoDB ──────────────────────────────
  mongo:
    image: mongo:7
    container_name: testask_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-testask}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-testask_secret}
      MONGO_INITDB_DATABASE: testask
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────── Backend ──────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: testask_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-testask}:${MONGO_PASS:-testask_secret}@mongo:27017/testask?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_too}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      APP_URL: ${APP_URL:-http://localhost}
    ports:
      - "5000:5000"
    volumes:
      - server_uploads:/app/uploads

  # ─────────────────────────── Frontend (built, served by nginx) ──────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: testask_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mongo_data:
  server_uploads:
