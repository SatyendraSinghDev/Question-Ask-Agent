<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" role="img" aria-label="TestASK AI logo">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: hexagonal prism with question mark + graduation cap node -->
  <g transform="translate(8,4)">
    <path d="M24 0 L44 11.5 L44 34.5 L24 46 L4 34.5 L4 11.5 Z"
          fill="url(#brandGrad)"/>
    <path d="M24 0 L44 11.5 L24 23 L4 11.5 Z" fill="#000" opacity="0.10"/>
    <!-- Question mark stroke -->
    <path d="M17 16.5 C17 11 22 9.5 25.5 9.5 C30 9.5 33 12 33 16
             C33 19.5 30.5 21 28 22.6 C26.4 23.6 26 24.8 26 26.6"
          fill="none" stroke="url(#markGrad)" stroke-width="3.6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="26" cy="32" r="2.6" fill="url(#markGrad)"/>
    <!-- AI neural orbit node -->
    <circle cx="38" cy="34" r="2.4" fill="#FACC15"/>
    <circle cx="9" cy="30" r="1.8" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Segoe UI', Inter, system-ui, sans-serif" font-weight="700">
    <text x="62" y="27" font-size="20" fill="#0F172A">Test</text>
    <text x="103" y="27" font-size="20" fill="#6366F1">ASK</text>
    <text x="141" y="27" font-size="20" fill="#06B6D4">AI</text>
    <text x="62" y="44" font-size="8.5" letter-spacing="2.4"
          fill="#64748B" font-weight="600">INTELLIGENT ASSESSMENT</text>
  </g>
</svg>
