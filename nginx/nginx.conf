# TestASK AI — Nginx reverse proxy (production)
# - Serves the built React SPA from /usr/share/nginx/html
# - Proxies /api/* to the Node backend
# - Gzip, security headers, SPA fallback

upstream testask_backend {
  server server:5000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ─────────── Security headers ───────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # ─────────── Gzip ───────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             application/xml application/rss+xml image/svg+xml font/woff2;

  # ─────────── Upload limits (for AI image/pdf question generation) ───────────
  client_max_body_size 25M;

  # ─────────── API proxy ───────────
  location /api/ {
    proxy_pass http://testask_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 90s;
  }

  # ─────────── Static assets (long cache) ───────────
  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|webp|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # ─────────── SPA fallback ───────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # healthcheck endpoint for the container
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
