# Render Blueprint — deploys the TestASK AI backend as a Web Service.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render → New → Blueprint → select the repo.
#   3. Fill in the environment variables (see DEPLOYMENT.md) when prompted.

services:
  - type: web
    name: testask-api
    runtime: node
    plan: free
    rootDir: server
    # `--include=dev` ensures tsc/tsx are available for the build even though
    # NODE_ENV=production is set for the running service.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Secrets — set these in the Render dashboard (or link a group):
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
